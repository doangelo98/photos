<!DOCTYPE html>
<html lang="en">
  <head>
    <meta
      name="description"
      content="Photos, a grid-based theme with featured images, a modern, minimalist design perfect for photoblogging."
    />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Photos</title>
    <link
      rel="stylesheet"
      href="./styles/index.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu"
    />
  </head>
  <body>
    <span class="material-symbols-outlined"> menu </span>
    <nav>
      <a href="">Photos</a>
    </nav>
    <div id="overlay">
      <ul>
        <a href=""><li>Instagram</li></a>
        <a href=""><li>Mail</li></a>
      </ul>
      <button
        id="off"
        onclick="off()"
      >
        Turn
      </button>
    </div>

    <script>
      function on() {
        document.getElementById('overlay').style.display = 'block';
      }

      function off() {
        document.getElementById('overlay').style.display = 'none';
      }
    </script>
  </body>
</html>
